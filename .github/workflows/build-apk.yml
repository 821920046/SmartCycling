name: Build APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 准备 Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: 构建 Release APK
        run: gradle assembleRelease --no-daemon --stacktrace -PCLOUD_SYNC_URL=${{ secrets.CLOUD_SYNC_URL }} -PCLOUD_SYNC_TOKEN=${{ secrets.CLOUD_SYNC_TOKEN }} -PAMAP_KEY=${{ secrets.AMAP_KEY }}

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: smart-cycling-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
